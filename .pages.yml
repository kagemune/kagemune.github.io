media:
  - name: assets
    label: Assets
    input: src/assets
    output: ../../assets
content:
  - name: projects
    label: Projects
    type: collection
    path: src/content/projects
    fields:
      - { name: id, label: ID, type: number }
      - { name: title, label: Title, type: string, maxlength: 50 }
      - name: tools
        label: Tools
        type: select
        options:
          multiple: true
          values:
            - HTML
            - JavaScript
            - TypeScript
            - LIVE
            - Docker
            - React Native
            - Backend API
            - Node.js
            - Tailwind
      - { name: year, label: Year, type: string, maxlength: 4 }
      - { name: github, label: GitHub URL, type: string }
      - { name: liveSite, label: Live Site URL, type: string }
      - name: description
        label: Description
        type: text
        options:
          maxlength: 350
      - { name: isFeatured, label: Featured, type: boolean, default: false }
      - { name: isDraft, label: Draft, type: boolean, default: true }
  - name: blog
    label: Blog
    type: collection
    path: src/content/blog
    fields:
      - { name: id, label: ID, type: number }
      - { name: title, label: Title, type: string, maxlength: 50 }
      - { name: slug, label: Slug, type: string, maxlength: 50 } 
      - { name: publishedDate, label: Published Date, type: date }
      - name: category
        label: Category
        type: select
        options:
          values:
            - Placeholder 1
            - Placeholder 2
      - { name: isDraft, label: Draft, type: boolean, default: true }
      - { name: body, label: Content, type: rich-text }